# Site Settings
remote_theme: "mmistakes/minimal-mistakes@4.28.0"
minimal_mistakes_skin: "default" # "air", "aqua", "contrast", "dark", "dirt", "neon", "mint", "plum", "sunrise"

locale: "en-US"
title: "S. Bahar Sener, PhD"
subtitle: ""
name: "S. Bahar Sener"
description: "Behavioral scientist with 8+ years of experience turning psychological constructs into measurable systems."
url: "https://baharsener.github.io"
repository: "baharsener/baharsener.github.io"

# Author / sidebar
author:
  name: "Hi, I'm Bahar"
  avatar: "/assets/images/bahar.JPEG"
  bio: "I design experiments, build data pipelines, and turn results into decisions."
  location: "Seattle, WA"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:sukranbaharsener@gmail.com"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/sbsener/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/baharsener"
    - label: "Google Scholar"
      icon: "fas fa-fw fa-graduation-cap"
      url: "https://scholar.google.com/citations?hl=en&user=9_biI5QAAAAJ"

# Reading Files
include:
  - _pages

# Outputting
permalink: /:categories/:title/

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-remote-theme

# Defaults
defaults:
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
